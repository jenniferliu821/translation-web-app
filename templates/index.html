<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多语言翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #2e7d32;
            font-weight: 600;
            word-break: break-all;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        .loader.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .download-btn {
            background: #4caf50;
            color: white;
            text-decoration: none;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .supported-languages {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .supported-languages h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .language-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .language-item {
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 多语言翻译工具</h1>
        <p class="subtitle">支持 11 种语言之间的自动翻译</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传 CSV 文件</div>
            <div class="upload-hint">支持的文件格式: .csv</div>
            <input type="file" id="fileInput" accept=".csv">
        </div>

        <div class="file-info" id="fileInfo">
            <div>已选择文件:</div>
            <div class="file-name" id="fileName"></div>
        </div>

        <button class="btn btn-primary" id="translateBtn" disabled>开始翻译</button>

        <div class="loader" id="loader"></div>

        <div class="status" id="status"></div>

        <div class="supported-languages">
            <h3>✨ 支持的语言</h3>
            <div class="language-list">
                <div class="language-item">🇸🇦 Arabic (阿拉伯语)</div>
                <div class="language-item">🇩🇪 German (德语)</div>
                <div class="language-item">🇺🇸 English (英语)</div>
                <div class="language-item">🇪🇸 Spanish (西班牙语)</div>
                <div class="language-item">🇫🇷 French (法语)</div>
                <div class="language-item">🇮🇩 Indonesian (印尼语)</div>
                <div class="language-item">🇮🇹 Italian (意大利语)</div>
                <div class="language-item">🇯🇵 Japanese (日语)</div>
                <div class="language-item">🇧🇷 Portuguese (葡萄牙语)</div>
                <div class="language-item">🇹🇷 Turkish (土耳其语)</div>
                <div class="language-item">🇨🇳 Chinese (简体中文)</div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const translateBtn = document.getElementById('translateBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');

        let selectedFile = null;

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;

            if (!file.name.endsWith('.csv')) {
                showStatus('只支持 CSV 文件！', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.classList.add('show');
            translateBtn.disabled = false;
            status.classList.remove('show');
        }

        // 翻译按钮
        translateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            translateBtn.disabled = true;
            loader.classList.add('show');
            showStatus('正在翻译中，请稍候...', 'info');

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.error) {
                    showStatus('错误: ' + result.error, 'error');
                } else {
                    showStatus(
                        `翻译完成！<br><a href="${result.download_url}" class="download-btn">📥 下载结果文件</a>`,
                        'success'
                    );
                }
            } catch (error) {
                showStatus('翻译失败: ' + error.message, 'error');
            } finally {
                loader.classList.remove('show');
                translateBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.innerHTML = message;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>
